<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVAC & R 專業冷媒熱力學與循環分析系統 (Web Worker 版)</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        /* 簡單的載入中遮罩樣式 */
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999;
            justify-content: center; align-items: center; font-size: 24px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">WASM 引擎載入中 / 計算中...</div>

    <!-- 你的 UI 元素放這裡 -->
    <button id="calcBtn" disabled>執行分析與繪圖</button>
    <div id="plotDiv"></div>

    <script>
        const loadingOverlay = document.getElementById('loadingOverlay');
        const calcBtn = document.getElementById('calcBtn');

        // 1. 初始化 Web Worker
        const coolpropWorker = new Worker('coolprop_worker.js');
        
        // 用於追蹤異步任務的 ID 和 Promise
        let currentTaskId = 0;
        const taskCallbacks = {};

        // 2. 接收 Worker 傳來的訊息
        coolpropWorker.onmessage = function(event) {
            const data = event.data;

            if (data.type === 'READY') {
                console.log("CoolProp WASM 背景引擎已準備就緒！");
                calcBtn.disabled = false; // 啟用按鈕
                loadingOverlay.style.display = 'none';
            } 
            else if (data.type === 'CALCULATION_SUCCESS') {
                if (taskCallbacks[data.id]) {
                    taskCallbacks[data.id].resolve(data.payload);
                    delete taskCallbacks[data.id];
                }
            } 
            else if (data.type === 'CALCULATION_ERROR') {
                if (taskCallbacks[data.id]) {
                    taskCallbacks[data.id].reject(data.error);
                    delete taskCallbacks[data.id];
                }
            }
        };

        // 3. 封裝一個 Promise 函數來向 Worker 發送請求
        function runThermodynamicCalculation(params) {
            return new Promise((resolve, reject) => {
                const id = currentTaskId++;
                taskCallbacks[id] = { resolve, reject };
                
                coolpropWorker.postMessage({
                    id: id,
                    type: 'CALCULATE_CYCLE',
                    params: params
                });
            });
        }

        // 4. 綁定 UI 事件 (這裡不再會卡頓了！)
        calcBtn.addEventListener('click', async () => {
            // 顯示載入中
            loadingOverlay.innerHTML = "正在背景計算熱力學循環，請稍候...";
            loadingOverlay.style.display = 'flex';

            try {
                // 收集前端 UI 的參數 (例如蒸發溫度、冷凝溫度等)
                const userParams = {
                    fluid: 'R410A',
                    T_evap: 278.15, // 5°C
                    T_cond: 318.15  // 45°C
                    // ... 其他參數
                };

                // 等待背景 Worker 算完
                const result = await runThermodynamicCalculation(userParams);

                // 拿到資料後，在主線程呼叫 Plotly 繪圖
                const trace = {
                    x: result.enthalpy,
                    y: result.pressure,
                    type: 'scatter',
                    mode: 'lines+markers'
                };
                Plotly.newPlot('plotDiv', [trace], {title: 'P-h Diagram'});

            } catch (error) {
                alert("計算發生錯誤: " + error);
            } finally {
                // 隱藏載入中
                loadingOverlay.style.display = 'none';
            }
        });

        // 網頁一載入先顯示引擎準備中
        loadingOverlay.innerHTML = "WASM 引擎載入中...";
        loadingOverlay.style.display = 'flex';
    </script>
</body>
</html>
